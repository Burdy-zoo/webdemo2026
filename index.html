<!DOCTYPE html> 
<html LANG="EN ">
    <HEAD>
        <TITLE>THE LEARNING ACADEMY</TITLE>
        <META CHARSET="UTF-8">
			  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    </HEAD>
<body>
    <div class="container">
        <form>
            <h2>Student Registration Form</h2>
            <div class="form-group">
           <label for="name">Full Name:</label>
                     <input type="text" class="form-control" id="name" name="name" placeholder="Fullname" required> 
                 </div>
                 <div class="form-group">
                     <label for="name">Student Id:</label> 
                     <input type="text" class="form-control" id="name" name="studentid" placeholder="Student ID" required> 
                  </div>
                 <div class="form-group">
                     
                     <label for="name">Email:</label> 
                     <input type="email" class="form-control" id="name" name="email" placeholder="Email" required> 
                  </div>
                 <div class="form-group">
                 
                     <label for="name">Mobile Number</label> 
                     <input type="number" class="form-control" id="name" name="mobile" placeholder="999-344-4444" required> 
                 
                  </div>
                 <div class="form-group">
                     <label><h3>Gende</h3>r</label><br> 
                     <label class="radio-inline">
                        <input type ="radio" class="form-control" id="name" name="gender" value="male" > Male
                     </label>
                     <label class="radio-inline">
                        <input type ="radio" class="form-control" id="name" name="gender" value="female">Female
                     </label>
                  </div>
                 <div class="form-group">
                     <label for="name">Course</label> 
					 		<select class="form-control" id="name" name="course">
								<option>Maths</option>
								<option>CS</option>
								<option>Physics</option>
								<option>DataBase Management</option>
							</select> 
                  </div>
                 <div class="form-group">
                     
                     <label for="name">Date of birth</label> 
                     <input type="date" class="form-control" id="name" name="dob" placeholder="DoB"> 

                  </div>
                 <div class="form-group">
                 
                     <label for="name">Address</label> 
                     <textarea class="form-control" id="name" name="address" placeholder="Address"></textarea> 
                 </div>
                 <div class="form-group">
					     <button class="btn btn-success" type="submit" class="btn btn-primary">Submit</button>
                   
                        <button class="btn btn-info" type="reset" class="btn btn-info">Reset</button>
				 </div>
		</form>
     </div>
</body>
</html>
